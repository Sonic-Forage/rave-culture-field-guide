<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#0a0a12"/>
<stop offset="50%" style="stop-color:#1a0a2e"/>
<stop offset="100%" style="stop-color:#0a0a12"/>
</linearGradient>
<linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#00ff88"/>
<stop offset="25%" style="stop-color:#00e5ff"/>
<stop offset="50%" style="stop-color:#b829dd"/>
<stop offset="75%" style="stop-color:#ff2d95"/>
<stop offset="100%" style="stop-color:#ffd700"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="3" result="blur"/>
<feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>
<rect width="1200" height="630" fill="url(#bg)"/>
<!-- Scanlines -->
<rect width="1200" height="630" fill="url(#bg)" opacity="0"/>
<line x1="0" y1="0" x2="1200" y2="0" stroke="rgba(0,255,136,0.03)" stroke-width="1"/>
<g opacity="0.03">
<rect y="0" width="1200" height="2" fill="#00ff88"/>
<rect y="4" width="1200" height="2" fill="#00ff88"/>
<rect y="8" width="1200" height="2" fill="#00ff88"/>
</g>
<!-- Center glow -->
<circle cx="600" cy="315" r="300" fill="rgba(0,255,136,0.04)"/>
<circle cx="600" cy="315" r="200" fill="rgba(184,41,221,0.04)"/>
<!-- Strawberry -->
<text x="600" y="200" font-size="80" text-anchor="middle" fill="#ff2d95" filter="url(#glow)">🍓</text>
<!-- Title -->
<text x="600" y="300" font-family="monospace" font-size="52" font-weight="bold" text-anchor="middle" fill="url(#text)" filter="url(#glow)">RAVE CULTURE</text>
<text x="600" y="360" font-family="monospace" font-size="40" font-weight="bold" text-anchor="middle" fill="url(#text)" filter="url(#glow)">FIELD GUIDE</text>
<!-- Subtitle -->
<text x="600" y="420" font-family="monospace" font-size="18" text-anchor="middle" fill="#00e5ff">THE COMPLETE STORY — 1960s TO AUTONOMOUS DJs</text>
<!-- Stats -->
<text x="200" y="500" font-family="monospace" font-size="16" text-anchor="middle" fill="#00ff88" filter="url(#glow)">60+ YEARS</text>
<text x="400" y="500" font-family="monospace" font-size="16" text-anchor="middle" fill="#b829dd" filter="url(#glow)">200+ TERMS</text>
<text x="600" y="500" font-family="monospace" font-size="16" text-anchor="middle" fill="#ff2d95" filter="url(#glow)">9 CHAPTERS</text>
<text x="800" y="500" font-family="monospace" font-size="16" text-anchor="middle" fill="#ffd700" filter="url(#glow)">FULL DJ GUIDE</text>
<text x="1000" y="500" font-family="monospace" font-size="16" text-anchor="middle" fill="#00e5ff" filter="url(#glow)">RAVE ACT</text>
<!-- Bottom tagline -->
<text x="600" y="570" font-family="monospace" font-size="14" text-anchor="middle" fill="#555">Built 100% by Hermes Agent by Nous Research</text>
<text x="600" y="600" font-family="monospace" font-size="12" text-anchor="middle" fill="#333">The bass is strong with this one 🍓</text>
</svg>
